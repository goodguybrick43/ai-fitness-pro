name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EAS_NO_VARS_TOKEN }}

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install

      - name: Force Clean Configs
        # Writing everything on one line to prevent mobile formatting errors
        run: |
          echo '{"expo":{"name":"AI Fitness Pro","slug":"ai-fitness-pro","owner":"goodguybrick","version":"1.0.0","extra":{"eas":{"projectId":"9bb42eb3-2ffe-46d1-abf5-cbb01e8de050"}},"android":{"package":"com.goodguybrick.aifitnesspro"}}}' > app.json
          echo '{"build":{"preview":{"android":{"buildType":"apk"}}}}' > eas.json

      - name: Debug Configs
        # This will show us exactly what the files look like in the log
        run: |
          echo "--- app.json ---"
          cat app.json
          echo -e "\n--- eas.json ---"
          cat eas.json

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive
