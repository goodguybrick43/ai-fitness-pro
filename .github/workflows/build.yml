name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EAS_NO_VARS_TOKEN }}

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install

      - name: Force Create Config Files
        # This creates the eas.json on the fly so mobile-formatting can't break it
        run: |
          cat > eas.json <<EOF
          {
            "build": {
              "preview": {
                "android": {
                  "buildType": "apk"
                }
              }
            }
          }
          EOF

      - name: Build APK
        # Now we run the build using the file we just created
        run: eas build --platform android --profile preview --non-interactive
