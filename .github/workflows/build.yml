name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          token: ${{ secrets.EAS_NO_VARS_TOKEN }}

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install

      - name: Configure Credentials and Build
        run: |
          # This command creates the keystore on Expo's servers so the build doesn't have to
          eas build --platform android --profile preview --non-interactive --no-wait || true
          # Now that the keystore exists, the actual build can run
          eas build --platform android --profile preview --non-interactive
